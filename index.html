<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARISS_WA_Scouts_Contact_Completed.html</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121b2e;
      --text: #eaf1ff;
      --muted: #a7b6d6;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 12px 30px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #08101d 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .card {
      width: min(720px, 92vw);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 20px 18px 18px;
      text-align: center;
    }

    h1 {
      margin: 0 0 6px 0;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .sub {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 14px;
    }

    .main-time {
      font-size: 1.9rem;
      font-weight: 900;
      margin: 8px 0 2px;
    }

    .label {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 8px;
    }

    .zone {
      color: var(--muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .time {
      font-size: 0.95rem;
      font-weight: 800;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ARISS WA Scouts Contact</h1>
    <div class="sub">Event completed · Friday 17 April 2026</div>

    <div class="label">Contact time (AOS)</div>
    <div class="main-time">10:22:38 UTC</div>

    <div class="grid">
      <div class="box">
        <div class="zone">UTC</div>
        <div class="time">10:22:38</div>
      </div>
      <div class="box">
        <div class="zone">New Hampshire</div>
        <div class="time">6:22:38 am</div>
      </div>
      <div class="box">
        <div class="zone">WA</div>
        <div class="time">6:22:38 pm</div>
      </div>
      <div class="box">
        <div class="zone">QLD</div>
        <div class="time">8:22:38 pm</div>
      </div>
    </div>
  </div>
</body>
</html>
